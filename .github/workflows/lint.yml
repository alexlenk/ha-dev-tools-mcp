name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
          pip install -e ".[dev]"
      
      - name: Run ruff
        run: ruff check src/ tests/
      
      - name: Run black
        run: black --check src/ tests/
      
      - name: Run mypy
        run: mypy src/ha_dev_tools/ --ignore-missing-imports
